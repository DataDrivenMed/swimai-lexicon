<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="SwimAI Lexicon: practical AI literacy for competitive swim coaches, performance staff, and swim families." />
    <title>SwimAI Lexicon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- ── Topbar ─────────────────────────── -->
      <header class="topbar">
        <button class="brand" id="homeButton" type="button">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">
            <span class="brand-title">SwimAI Lexicon</span>
            <span class="brand-subtitle">Better data, not less judgment</span>
          </span>
        </button>

        <div class="topbar-center">
          <nav class="nav" aria-label="Primary navigation">
            <button class="nav-button is-active" type="button" data-view="lexicon">
              <span class="nav-icon">📖</span> Lexicon
            </button>
            <button class="nav-button" type="button" data-view="lab">
              <span class="nav-icon">🏊</span> Race Lab
            </button>
            <button class="nav-button" type="button" data-view="checklist">
              <span class="nav-icon">✓</span> Tool Vetting
            </button>
            <button class="nav-button" type="button" data-view="privacy">
              <span class="nav-icon">🔒</span> Athlete Data
            </button>
            <button class="nav-button" type="button" data-view="usecases">
              <span class="nav-icon">⚡</span> In Practice
            </button>
          </nav>
        </div>

        <div class="topbar-right">
          <label class="role-picker">
            <span class="role-picker-label">Your lens</span>
            <select id="roleSelect" aria-label="Select your role"></select>
          </label>

          <!-- Social links in topbar -->
          <div class="topbar-social" aria-label="Author links">
            <a class="topbar-social-link topbar-social-link--linkedin"
               href="https://www.linkedin.com/in/ramnarayan/"
               target="_blank" rel="noreferrer"
               aria-label="Ram Paragi on LinkedIn" title="LinkedIn">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
            </a>
            <a class="topbar-social-link topbar-social-link--substack"
               href="https://swimed.substack.com/"
               target="_blank" rel="noreferrer"
               aria-label="Ram Paragi on Substack" title="Substack — SwimEd">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/>
              </svg>
            </a>
            <a class="topbar-social-link topbar-social-link--email"
               href="mailto:ramparagi@gmail.com"
               aria-label="Email Ram Paragi" title="Email Ram Paragi">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
              </svg>
            </a>
          </div>
        </div>
      </header>

      <!-- ── Sidebar ────────────────────────── -->
      <aside class="sidebar" aria-label="Lexicon navigation">

        <div class="sidebar-search">
          <div class="search-wrap">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="Search terms…" aria-label="Search terms" />
          </div>
        </div>

        <div class="module-section">
          <button class="module-toggle" id="moduleToggle" type="button" aria-expanded="false" aria-controls="moduleFilter">
            <span>Filter by module</span>
            <span class="module-toggle-icon" aria-hidden="true">▾</span>
          </button>
          <div class="module-filter" id="moduleFilter" role="group" aria-label="Module filters"></div>
        </div>

        <div class="sidebar-stats" aria-label="Content summary">
          <div class="sidebar-stat">
            <strong id="termCount">0</strong>
            <span>terms</span>
          </div>
          <div class="sidebar-stat">
            <strong>6</strong>
            <span>modules</span>
          </div>
        </div>

        <div class="term-list" id="termList" role="list"></div>
      </aside>

      <!-- ── Content panel ──────────────────── -->
      <main class="content-panel" id="contentPanel" aria-live="polite" aria-atomic="false"></main>

      <!-- ── Footer ────────────────────────── -->
      <footer class="site-footer">
        <span class="footer-brand">SwimAI Lexicon · Better data, not less judgment.</span>
        <div class="footer-links">
          <button class="footer-link footer-link--sources" id="sourcesFooterLink" type="button">Evidence &amp; Sources</button>
          <span class="footer-sep">·</span>
          <span class="footer-credit">Built by <strong>Ram Paragi</strong></span>
          <div class="footer-social">
            <a class="footer-social-link"
               href="https://www.linkedin.com/in/ramnarayan/"
               target="_blank" rel="noreferrer"
               aria-label="LinkedIn" title="LinkedIn">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
            </a>
            <a class="footer-social-link"
               href="https://swimed.substack.com/"
               target="_blank" rel="noreferrer"
               aria-label="Substack — SwimEd" title="Substack">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/>
              </svg>
            </a>
            <a class="footer-social-link"
               href="mailto:ramparagi@gmail.com"
               aria-label="Email" title="Email Ram Paragi">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
              </svg>
            </a>
          </div>
        </div>
      </footer>

    </div>

    <script src="./data.js"></script>
    <script src="./use-cases.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
