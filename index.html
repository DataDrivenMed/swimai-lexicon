<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="SwimAI Lexicon: practical AI literacy for competitive swim coaches, performance staff, and swim families." />
    <title>SwimAI Lexicon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- ── Topbar ─────────────────────────── -->
      <header class="topbar">
        <button class="brand" id="homeButton" type="button">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">
            <span class="brand-title">SwimAI Lexicon</span>
            <span class="brand-subtitle">Better data, not less judgment</span>
          </span>
        </button>

        <div class="topbar-center">
          <nav class="nav" aria-label="Primary navigation">
            <button class="nav-button is-active" type="button" data-view="lexicon">
              <span class="nav-icon">📖</span> Lexicon
            </button>
            <button class="nav-button" type="button" data-view="lab">
              <span class="nav-icon">🏊</span> Race Lab
            </button>
            <button class="nav-button" type="button" data-view="checklist">
              <span class="nav-icon">✓</span> Tool Vetting
            </button>
            <button class="nav-button" type="button" data-view="privacy">
              <span class="nav-icon">🔒</span> Athlete Data
            </button>
            <button class="nav-button" type="button" data-view="usecases">
              <span class="nav-icon">⚡</span> In Practice
            </button>
          </nav>
        </div>

        <div class="topbar-right">
          <label class="role-picker">
            <span class="role-picker-label">Your lens</span>
            <select id="roleSelect" aria-label="Select your role"></select>
          </label>
        </div>
      </header>

      <!-- ── Sidebar ────────────────────────── -->
      <aside class="sidebar" aria-label="Lexicon navigation">

        <div class="sidebar-search">
          <div class="search-wrap">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="Search terms…" aria-label="Search terms" />
          </div>
        </div>

        <div class="module-section">
          <button class="module-toggle" id="moduleToggle" type="button" aria-expanded="false" aria-controls="moduleFilter">
            <span>Filter by module</span>
            <span class="module-toggle-icon" aria-hidden="true">▾</span>
          </button>
          <div class="module-filter" id="moduleFilter" role="group" aria-label="Module filters"></div>
        </div>

        <div class="sidebar-stats" aria-label="Content summary">
          <div class="sidebar-stat">
            <strong id="termCount">0</strong>
            <span>terms</span>
          </div>
          <div class="sidebar-stat">
            <strong>6</strong>
            <span>modules</span>
          </div>
        </div>

        <div class="term-list" id="termList" role="list"></div>
      </aside>

      <!-- ── Content panel ──────────────────── -->
      <main class="content-panel" id="contentPanel" aria-live="polite" aria-atomic="false"></main>

      <!-- ── Footer ────────────────────────── -->
      <footer class="site-footer">
        <span class="footer-brand">SwimAI Lexicon · Better data, not less judgment.</span>
        <div class="footer-links">
          <button class="footer-link" id="sourcesFooterLink" type="button">Evidence &amp; Sources</button>
          <span class="footer-brand">·</span>
          <a class="footer-link" href="https://datadrivenmed.github.io" target="_blank" rel="noreferrer">DataDrivenMed</a>
        </div>
      </footer>

    </div>

    <script src="./data.js"></script>
    <script src="./use-cases.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
